name: Refresh Sigma DB

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clone SigmaHQ rules
        run: git clone --depth 1 https://github.com/SigmaHQ/sigma.git /tmp/sigmahq-sigma

      - name: Rebuild Sigma DB
        run: SIGMA_REPO_PATH=/tmp/sigmahq-sigma npm run build:db

      - name: Run validation
        run: npm run ci

      - name: Open PR with refreshed DB
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(data): refresh SigmaHQ rules database'
          title: 'chore(data): refresh SigmaHQ rules database'
          body: |
            Automated weekly refresh of `data/sigma_rules.db` from SigmaHQ/sigma.

            This PR was generated by the `Refresh Sigma DB` workflow.
          branch: codex/refresh-sigma-db
          delete-branch: true
          labels: |
            automated
            data-refresh
